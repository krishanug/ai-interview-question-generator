spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: interview-question-generator
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_generator_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.4

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO

server:
  port: 8080

app:
  ai:
    timeout-seconds: 30
