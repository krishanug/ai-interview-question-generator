spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: interview-question-generator
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_generator_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.4

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  ai:
    timeout-seconds: 30
  cache:
    questions-ttl-minutes: ${QUESTIONS_CACHE_TTL_MINUTES:30}
  rate-limit:
    max-requests-per-window: ${RATE_LIMIT_MAX_REQUESTS:20}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
