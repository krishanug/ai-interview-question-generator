services:
  - type: web
    name: ai-interview-question-generator-api
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: QUESTIONS_CACHE_TTL_MINUTES
        value: "30"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
